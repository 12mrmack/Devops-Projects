apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: empms-employee
  labels:
    app: empms-employee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: empms-employee
  template:
    metadata:
      labels:
        app: empms-employee
    spec:
      containers:
      - name: employee
        image: 12mrmack/empms-employee:v1
        ports:
        - containerPort: 8083
        env:
        - name: CONFIG_FILE
          value: "/root/config/config.yaml"
        - name: ELASTIC_APM_ENABLED
          value: "false"
