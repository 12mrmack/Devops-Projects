events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=30s;

    server {
        listen 3000;
        root /usr/share/nginx/html;
        index index.html;

        location /employee/ {
            set $backend http://empms-employee:8083;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /attendance/ {
            set $backend http://empms-attendance:8081;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /salary/ {
            set $backend http://empms-salary:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notification/ {
            return 503;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
