apiVersion: v1
kind: Service
metadata:
  name: empms-webserver
spec:
  type: NodePort
  selector:
    app: empms-webserver
  ports:
  - name: web
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
  - name: admin
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30880
